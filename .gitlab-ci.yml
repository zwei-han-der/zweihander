stages:
  - install
  - lint
  - build
  - deploy

variables:
  NODE_VERSION: "20"
  CI_DEFAULT_BRANCH: "main"

cache:
  key:
    files:
      - package-lock.json
    prefix: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/

.node_template:
  image: node:${NODE_VERSION}
  tags:
    - docker

# INSTALL
install_dependencies:
  extends: .node_template
  stage: install
  script:
    - npm ci
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 hour

# LINT
lint:
  extends: .node_template
  stage: lint
  dependencies:
    - install_dependencies
  script:
    - npm run lint
  allow_failure: true

# BUILD
build:
  extends: .node_template
  stage: build
  dependencies:
    - install_dependencies
  script:
    - npm run build
  artifacts:
    paths:
      - dist/
    expire_in: 1 day
  only:
    - main
    - develop
    - tags

# DEPLOY
deploy_staging:
  extends: .node_template
  stage: deploy
  environment:
    name: staging
    url: https://staging.beispiel.com
  dependencies:
    - build
  script:
    - echo "Deploying to staging..."
  only:
    - nightly

deploy_production:
  extends: .node_template
  stage: deploy
  environment:
    name: production
    url: https://www.beispiel.com
    deployment_tier: production
  dependencies:
    - build
  script:
    - echo "Deploying to production..."

  only:
    - main
  when: manual

pages:
  extends: .node_template
  stage: deploy
  dependencies:
    - build
  script:
    - mkdir -p public
    - cp -r dist/* public/
  artifacts:
    paths:
      - public
  only:
    - main

deploy_release:
  extends: .node_template
  stage: deploy
  environment:
    name: production
    url: https://www.beispiel.com
  dependencies:
    - build
  script:
    - echo "Deploying release ${CI_COMMIT_TAG}..."
  only:
    - tags
  when: manual
